function Spinner() {
  return <div style={{ width:20, height:20, border:'2px solid rgba(13,13,13,0.1)', borderTop:'2px solid #3D7A28', borderRadius:'50%', animation:'spin 0.7s linear infinite' }}/>;

function PageHeader({ title, subtitle, action }) {

    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:32, paddingBottom:24, borderBottom:'1px solid var(--border)' }}>

        {subtitle && <p style={{ fontFamily:'Space Mono', fontSize:10, opacity:0.4, marginTop:8, letterSpacing:'0.1em' }}>{subtitle}</p>}
      </div>
      {action}
    </div>
  );
}
function Btn({ children, onClick, variant='primary', small, disabled, loading }) {
  const styles = { primary:{background:'#3D7A28',color:'#fff',border:'none'}, secondary:{background:'transparent',color:'#0D0D0D',border:'1px solid rgba(13,13,13,0.25)'}, danger:{background:'transparent',color:'#C0392B',border:'1px solid #C0392B'} };
  return (
    <button onClick={onClick} disabled={disabled||loading} style={{ padding:small?'6px 14px':'10px 20px', fontFamily:'Barlow Condensed', fontWeight:700, fontSize:small?11:13, letterSpacing:'0.15em', textTransform:'uppercase', cursor:'pointer', opacity:(disabled||loading)?0.5:1, display:'flex', alignItems:'center', gap:8, transition:'opacity 0.2s', ...styles[variant] }}
      onMouseEnter={e => !disabled&&!loading&&(e.currentTarget.style.opacity='0.8')}
      onMouseLeave={e => e.currentTarget.style.opacity='1'}
    >{loading && <Spinner/>}{children}</button>
  );
}
function Field({ label, children }) {
  return <div style={{ marginBottom:20 }}><label style={{ fontFamily:'Space Mono', fontSize:9, letterSpacing:'0.15em', textTransform:'uppercase', opacity:0.45, display:'block', marginBottom:6 }}>{label}</label>{children}</div>;
}
function Input({ value, onChange, type='text', placeholder, ...rest }) {
  return <input type={type} value={value||''} onChange={onChange} placeholder={placeholder} style={{ width:'100%', padding:'10px 12px', border:'1px solid rgba(13,13,13,0.15)', background:'#fff', fontSize:14, color:'#0D0D0D' }} onFocus={e=>e.target.style.border='1px solid #3D7A28'} onBlur={e=>e.target.style.border='1px solid rgba(13,13,13,0.15)'} {...rest}/>;
}
function Textarea({ value, onChange, rows=3, placeholder }) {
  return <textarea value={value||''} onChange={onChange} rows={rows} placeholder={placeholder} style={{ width:'100%', padding:'10px 12px', border:'1px solid rgba(13,13,13,0.15)', background:'#fff', fontSize:14, color:'#0D0D0D', resize:'vertical' }} onFocus={e=>e.target.style.border='1px solid #3D7A28'} onBlur={e=>e.target.style.border='1px solid rgba(13,13,13,0.15)'}/>;
}
function Toggle({ value, onChange, label }) {

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return ()=>clearTimeout(t); }, []);
  return <div style={{ position:'fixed', bottom:24, right:24, background:'#0D0D0D', color:'#F5F0E8', padding:'12px 20px', fontFamily:'Barlow Condensed', fontWeight:700, fontSize:13, letterSpacing:'0.1em', textTransform:'uppercase', zIndex:999, animation:'fadeIn 0.3s ease', boxShadow:'0 4px 20px rgba(0,0,0,0.3)' }}>✓ {msg}</div>;
}

// ─── IMAGE UPLOADER ───────────────────────────────────────────────────────────
function MultiImageUploader({ value=[], onChange }) {
  const ref = useRef();
  const handleFile = e => {
    const files = Array.from(e.target.files);
    let pending = files.length;
    const newImgs = [];
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => { newImgs.push(ev.target.result); if (--pending===0) onChange([...value,...newImgs]); };
      reader.readAsDataURL(file);
    });
    e.target.value='';
  };
  return (
    <Field label="Fotos">
      <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:8 }}>
        {value.map((img,i) => (
          <div key={i} style={{ position:'relative', width:80, height:80 }}>
            <div style={{ width:80, height:80, backgroundImage:`url(${img})`, backgroundSize:'cover', backgroundPosition:'center', border:'1px solid rgba(13,13,13,0.1)' }}/>
            <button onClick={()=>onChange(value.filter((_,j)=>j!==i))} style={{ position:'absolute', top:-6, right:-6, width:20, height:20, background:'#C0392B', color:'#fff', fontSize:12, display:'flex', alignItems:'center', justifyContent:'center', borderRadius:'50%', border:'none', cursor:'pointer' }}>×</button>
            {i===0 && <div style={{ position:'absolute', bottom:0, left:0, right:0, background:'rgba(0,0,0,0.5)', fontFamily:'Space Mono', fontSize:7, color:'#fff', textAlign:'center', padding:'2px', letterSpacing:'0.05em' }}>PRINCIPAL</div>}
          </div>
        ))}
        <div onClick={()=>ref.current.click()} style={{ width:80, height:80, border:'1px dashed rgba(13,13,13,0.2)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', background:'#F0EBE0', flexShrink:0 }}>
          <span style={{ fontFamily:'Space Mono', fontSize:20, opacity:0.3 }}>+</span>
        </div>
      </div>
      <input ref={ref} type="file" accept="image/*" multiple onChange={handleFile} style={{ display:'none' }}/>
    </Field>
  );
}

function SingleImageUploader({ value, onChange, label='Imagen', height=120 }) {
  const ref = useRef();
  const handleFile = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => onChange(ev.target.result);
    reader.readAsDataURL(file); e.target.value='';
  };
  return (
    <Field label={label}>
      <div style={{ height, background:value?`url(${value}) center/cover`:'#E8E3D8', border:'1px dashed rgba(13,13,13,0.2)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', overflow:'hidden', position:'relative' }} onClick={()=>ref.current.click()}>

      </div>
      {value && <button onClick={()=>onChange(null)} style={{ fontFamily:'Space Mono', fontSize:9, opacity:0.35, textDecoration:'underline', marginTop:4, cursor:'pointer' }}>Eliminar</button>}
      <input ref={ref} type="file" accept="image/*" onChange={handleFile} style={{ display:'none' }}/>
    </Field>
  );
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
const MONTHS = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
const TAGS = ['FIL.','LIT.','ART.','MUS.','CIN.','GAS.','OTR.'];
const emptyEvent = () => ({ date:'01', month:'MAY', day:'SAB', time:'19:00', title:'', sub:'', desc:'', spots:15, total:20, price:10, tag:'ART.', active:true, img:null });

function EventsManager({ events, reload, toast, setToast }) {
  const [editing, setEditing] = useState(null);
  const [saving, setSaving] = useState(false);

  const saveEvent = async (ev) => {
    setSaving(true);
    if (ev.id) { await sb.from('events').update(evToDB(ev)).eq('id', ev.id); }
    else { await sb.from('events').insert(evToDB(ev)); }
    await reload();
    setSaving(false); setEditing(null); setToast('Evento guardado');
  };
  const deleteEvent = async (id) => {
    if (!confirm('¿Eliminar este evento?')) return;
    await sb.from('events').delete().eq('id', id);
    await reload(); setToast('Evento eliminado');
  };
  const toggleActive = async (ev) => {
    await sb.from('events').update({ active: !ev.active }).eq('id', ev.id);
    await reload();
  };

  return (
    <div>

    setSaving(true);

    if (!confirm('¿Eliminar?')) return;

// ─── GALLERY ──────────────────────────────────────────────────────────────────
function GalleryManager({ gallery, reload, setToast }) {
  const fileRef = useRef();
  const [newLabel, setNewLabel] = useState('');
  const [newDate, setNewDate] = useState('');
  const [uploading, setUploading] = useState(false);

  const handleUpload = e => {
    const file = e.target.files[0]; if (!file) return;
    setUploading(true);
    const reader = new FileReader();
    reader.onload = async ev => {
      const item = { label: newLabel||file.name.replace(/\.[^.]+$/,''), date: newDate||new Date().toLocaleDateString('es-ES',{month:'short',year:'numeric'}).toUpperCase(), img: ev.target.result };
      await sb.from('gallery').insert(galToDB(item));
      await reload(); setNewLabel(''); setNewDate(''); setUploading(false); setToast('Foto añadida');
    };
    reader.readAsDataURL(file); e.target.value='';
  };
  const deleteItem = async id => {
    if (!confirm('¿Eliminar esta foto?')) return;
    await sb.from('gallery').delete().eq('id', id);
    await reload(); setToast('Foto eliminada');
  };
  const updateItem = async (id, key, val) => {
    await sb.from('gallery').update({ [key]: val }).eq('id', id);
  };

  return (
    <div>
      <PageHeader title="Galería" subtitle={`${gallery.length} fotos`}/>
      <div style={{ background:'#fff', border:'2px dashed rgba(13,13,13,0.15)', padding:'32px', marginBottom:32, textAlign:'center' }}>
        <div style={{ marginBottom:16, display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, maxWidth:400, margin:'0 auto 16px' }}>
          <input value={newLabel} onChange={e=>setNewLabel(e.target.value)} placeholder="Título de la sesión" style={{ padding:'10px 12px', border:'1px solid rgba(13,13,13,0.15)', background:'#fff', fontSize:13, fontFamily:'Playfair Display', outline:'none' }}/>
          <input value={newDate} onChange={e=>setNewDate(e.target.value)} placeholder="Fecha: MAR 2025" style={{ padding:'10px 12px', border:'1px solid rgba(13,13,13,0.15)', background:'#fff', fontSize:13, fontFamily:'Playfair Display', outline:'none' }}/>
        </div>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleUpload} style={{ display:'none' }}/>
        <Btn onClick={()=>fileRef.current.click()} loading={uploading}>+ Subir foto</Btn>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
        {gallery.map(item=>(
          <div key={item.id} style={{ background:'#fff', border:'1px solid var(--border)', overflow:'hidden' }}>
            <div style={{ height:160, background:item.img?`url(${item.img}) center/cover`:'#1C1814', position:'relative', display:'flex', alignItems:'center', justifyContent:'center' }}>
              {!item.img && <span style={{ fontFamily:'Space Mono', fontSize:9, color:'rgba(245,240,232,0.3)' }}>Sin imagen</span>}
              <button onClick={()=>deleteItem(item.id)} style={{ position:'absolute', top:8, right:8, width:24, height:24, background:'rgba(192,57,43,0.8)', color:'#fff', fontSize:14, display:'flex', alignItems:'center', justifyContent:'center', border:'none', cursor:'pointer' }}>×</button>
            </div>
            <div style={{ padding:'12px' }}>
              <input defaultValue={item.label} onBlur={e=>updateItem(item.id,'label',e.target.value)} style={{ width:'100%', border:'none', fontFamily:'Barlow Condensed', fontWeight:700, fontSize:15, color:'#0D0D0D', background:'transparent', marginBottom:4, outline:'none' }}/>
              <input defaultValue={item.date} onBlur={e=>updateItem(item.id,'date',e.target.value)} style={{ width:'100%', border:'none', fontFamily:'Space Mono', fontSize:9, color:'#0D0D0D', opacity:0.4, background:'transparent', outline:'none', letterSpacing:'0.1em' }}/>
            </div>
          </div>
        ))}
      </div>
      {gallery.length===0 && <div style={{ textAlign:'center', padding:'48px', opacity:0.3, fontFamily:'Playfair Display', fontStyle:'italic' }}>Sube tu primera foto.</div>}
    </div>
  );
}

function Settings({ settings, reload, setToast }) {
  const [form, setForm] = useState({...settings});
  const [passForm, setPassForm] = useState({ current:'', new1:'', new2:'' });
  const [passErr, setPassErr] = useState('');
  const [saving, setSaving] = useState(false);
  const f = k => e => setForm({...form,[k]:e.target.value});

  const saveSettings = async () => {
    setSaving(true);
    await sb.from('settings').update(settToDB(form)).eq('id', 1);
    await reload(); setSaving(false); setToast('Ajustes guardados');
  };
  const changePass = () => {
    const stored = localStorage.getItem('cp_admin_pass')||'clubparr';
    if (passForm.current!==stored) { setPassErr('Contraseña actual incorrecta'); return; }
    if (passForm.new1.length<4) { setPassErr('Mínimo 4 caracteres'); return; }
    if (passForm.new1!==passForm.new2) { setPassErr('No coinciden'); return; }
    localStorage.setItem('cp_admin_pass', passForm.new1);
    setPassForm({current:'',new1:'',new2:''}); setPassErr(''); setToast('Contraseña cambiada');
  };

  return (
    <div>
      <PageHeader title="Ajustes"/>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:24 }}>
        <div style={{ background:'#fff', padding:'28px', border:'1px solid var(--border)' }}>

          <Field label="Ciudad"><Input value={form.city} onChange={f('city')}/></Field>
          <Field label="Email"><Input value={form.email} onChange={f('email')} type="email"/></Field>
          <Field label="Instagram"><Input value={form.instagram} onChange={f('instagram')}/></Field>
          <Field label="WhatsApp"><Input value={form.whatsapp} onChange={f('whatsapp')}/></Field>
          <Field label="Manifiesto"><Textarea value={form.manifesto} onChange={f('manifesto')} rows={3}/></Field>
          <Field label="Color acento">
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <input type="color" value={form.accentColor} onChange={f('accentColor')} style={{ width:44, height:36, border:'none', cursor:'pointer' }}/>
              <div style={{ width:44, height:36, background:form.accentColor }}/>
            </div>
          </Field>
          <Btn onClick={saveSettings} loading={saving}>Guardar ajustes</Btn>
        </div>
        <div>
          <div style={{ background:'#fff', padding:'28px', border:'1px solid var(--border)', marginBottom:16 }}>
            <div style={{ fontFamily:'Barlow Condensed', fontWeight:900, fontSize:18, textTransform:'uppercase', marginBottom:20, letterSpacing:'0.1em' }}>Cambiar contraseña</div>
            <Field label="Actual"><Input type="password" value={passForm.current} onChange={e=>setPassForm({...passForm,current:e.target.value})}/></Field>
            <Field label="Nueva"><Input type="password" value={passForm.new1} onChange={e=>setPassForm({...passForm,new1:e.target.value})}/></Field>
            <Field label="Repetir"><Input type="password" value={passForm.new2} onChange={e=>setPassForm({...passForm,new2:e.target.value})}/></Field>
            {passErr && <p style={{ fontFamily:'Space Mono', fontSize:9, color:'#C0392B', marginBottom:12 }}>{passErr}</p>}
            <Btn onClick={changePass}>Cambiar contraseña</Btn>
          </div>
          <div style={{ background:'#0D0D0D', padding:'28px' }}>
            <div style={{ fontFamily:'Space Mono', fontSize:9, color:'#F5F0E8', opacity:0.4, letterSpacing:'0.1em', marginBottom:8 }}>BASE DE DATOS</div>
            <div style={{ fontFamily:'Barlow Condensed', fontWeight:700, fontSize:14, color:'#3D7A28', marginBottom:4 }}>✓ Conectado a Supabase</div>
            <div style={{ fontFamily:'Space Mono', fontSize:9, color:'#F5F0E8', opacity:0.3, lineHeight:1.7 }}>yeyuqwaqitaysyyidiwa<br/>West EU (Ireland)</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [auth, setAuth] = useState(()=>sessionStorage.getItem('cp_auth')==='1');
  const [section, setSection] = useState('dashboard');
  const [loading, setLoading] = useState(true);
  const [events, setEvents] = useState([]);
  const [products, setProducts] = useState([]);
  const [gallery, setGallery] = useState([]);
  const [reservations, setReservations] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [toast, setToast] = useState('');

  const loadAll = useCallback(async () => {
    setLoading(true);
    const [ev, pr, ga, re, se] = await Promise.all([
      sb.from('events').select('*').order('created_at'),
      sb.from('products').select('*').order('created_at'),
      sb.from('gallery').select('*').order('created_at'),
      sb.from('reservations').select('*').order('created_at', { ascending: false }),
      sb.from('settings').select('*').eq('id', 1).single(),
    ]);
    setEvents((ev.data||[]).map(evFromDB));
    setProducts((pr.data||[]).map(prodFromDB));
    setGallery((ga.data||[]).map(galFromDB));
    setReservations(re.data||[]);
    if (se.data) setSettings(settFromDB(se.data));
    setLoading(false);
  }, []);

  useEffect(() => { if (auth) loadAll(); }, [auth]);

  const login = () => { sessionStorage.setItem('cp_auth','1'); setAuth(true); };
  const logout = () => { sessionStorage.removeItem('cp_auth'); setAuth(false); };

  if (!auth) return <Login onLogin={login}/>;

  const sections = {
    dashboard: <Dashboard events={events} products={products} gallery={gallery} reservations={reservations} setSection={setSection}/>,
    events: <EventsManager events={events} reload={loadAll} toast={toast} setToast={setToast}/>,
    products: <ProductsManager products={products} reload={loadAll} setToast={setToast}/>,
    gallery: <GalleryManager gallery={gallery} reload={loadAll} setToast={setToast}/>,
    reservations: <ReservationsManager reservations={reservations} reload={loadAll} setToast={setToast}/>,
    settings: <Settings settings={settings} reload={loadAll} setToast={setToast}/>,
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar active={section} setActive={setSection} onLogout={logout} counts={{ events:events.length, products:products.length, gallery:gallery.length, reservations:reservations.length }}/>
      <main style={{ marginLeft:220, flex:1, padding:'40px 48px', minHeight:'100vh', background:'#F5F0E8' }}>
        {loading ? (
          <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'60vh', flexDirection:'column', gap:16 }}>
            <Spinner/>
            <p style={{ fontFamily:'Space Mono', fontSize:10, opacity:0.4, letterSpacing:'0.1em' }}>CARGANDO DESDE SUPABASE...</p>
          </div>
        ) : sections[section]}
      </main>
      {toast && <Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
