<style>

    --paper: #F5F0E8;

    --red: #2D5016;

    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-image: url('logo.png');
    mask-size: contain;
    mask-repeat: no-repeat;
    mask-position: center;
  }
  .logo-white {
    background: #fff;
    -webkit-mask-image: url('logo.png');
    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-image: url('logo.png');
    mask-size: contain;
    mask-repeat: no-repeat;

  .logo-black {
    background: var(--black);

    -webkit-mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    -webkit-mask-position: center;
    mask-image: url('logo.png');

    mask-repeat: no-repeat;

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s cubic-bezier(0.22,1,0.36,1), transform 0.7s cubic-bezier(0.22,1,0.36,1); }

  @keyframes slideR { from{transform:translateX(-40px);opacity:0} to{transform:none;opacity:1} }
  @keyframes tickerMove { from{transform:translateX(0)} to{transform:translateX(-50%)} }
</style>

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.08 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

// ─── SIDEBAR NAV ─────────────────────────────────────────────────────────────
function SideNav({ cartCount, onCartOpen, tweaks }) {
  const [active, setActive] = useState('');
  const sections = ['club','eventos','galeria','tienda','contacto'];
  useEffect(() => {
    const fn = () => {
      const scrollY = window.scrollY + 200;
      let current = '';
      sections.forEach(id => {
        const el = document.getElementById(id);
        if (el && el.offsetTop <= scrollY) current = id;
      });
      setActive(current);
    };
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav style={{
      position: 'fixed', left: 0, top: 0, bottom: 0, width: 64, zIndex: 100,
      background: tweaks.paperColor, borderRight: '1px solid rgba(13,13,13,0.1)',
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'space-between',
      padding: '24px 0',
    }}>

      <a href="#hero" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div className="logo-red" style={{ width: 36, height: 36 }}/>
      </a>
      {/* Nav links vertical */}
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 28 }}>
        {sections.map((s, i) => (
          <a key={s} href={`#${s}`} style={{
            writingMode: 'vertical-rl', textOrientation: 'mixed',
            fontFamily: 'Space Mono', fontSize: 9, letterSpacing: '0.15em', textTransform: 'uppercase',
            color: active === s ? tweaks.accentColor : 'rgba(13,13,13,0.35)',
            transition: 'color 0.3s', fontWeight: active === s ? 700 : 400,
          }}>{String(i+1).padStart(2,'0')}</a>
        ))}
      </div>
      {/* Cart */}
      <button onClick={onCartOpen} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={cartCount > 0 ? tweaks.accentColor : '#0D0D0D'} strokeWidth="1.5">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        {cartCount > 0 && <span style={{ fontFamily: 'Space Mono', fontSize: 8, color: tweaks.accentColor, fontWeight: 700 }}>{cartCount}</span>}
      </button>
    </nav>
  );
}

// ─── TICKER ───────────────────────────────────────────────────────────────────
function Ticker({ tweaks }) {

    <div style={{ background: tweaks.accentColor, overflow: 'hidden', height: 36, display: 'flex', alignItems: 'center' }}>
      <div style={{ display: 'flex', gap: 40, animation: 'tickerMove 18s linear infinite', whiteSpace: 'nowrap' }}>

          <span key={i} style={{ fontFamily: 'Barlow Condensed', fontWeight: 700, fontSize: 14, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#fff' }}>
            {t} <span style={{ opacity: 0.5, marginLeft: 16 }}>×</span>

function EventRow({ ev, tweaks, onReserve, idx }) {
  const [hov, setHov] = useState(false);
  const pct = Math.round((ev.total - ev.spots) / ev.total * 100);
  return (
    <div className={`reveal reveal-l`}
      style={{
        display: 'grid', gridTemplateColumns: '100px 1fr auto auto',
        gap: 32, alignItems: 'center', padding: '28px 0',
        borderBottom: '1px solid rgba(245,240,232,0.07)',
        background: hov ? 'rgba(42,92,30,0.06)' : 'transparent',
        transition: 'background 0.3s', cursor: 'pointer',
      }}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
    >
      {/* Date */}
      <div>
        <div style={{ fontFamily: 'Barlow Condensed', fontWeight: 900, fontSize: 52, lineHeight: 1, color: hov ? tweaks.accentColor : '#F5F0E8', transition: 'color 0.3s' }}>{ev.date}</div>
        <div style={{ fontFamily: 'Space Mono', fontSize: 9, color: '#F5F0E8', opacity: 0.4, letterSpacing: '0.1em' }}>{ev.month} · {ev.time}</div>
      </div>
      {/* Info */}
      <div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
          <span style={{ fontFamily: 'Playfair Display', fontWeight: 800, fontSize: 20, color: '#F5F0E8' }}>{ev.title}</span>
          <span style={{ fontFamily: 'Playfair Display', fontSize: 18, color: tweaks.accentColor, opacity: 0.8 }}>{ev.tag}</span>
        </div>
        <div style={{ fontFamily: 'Space Mono', fontSize: 9, color: '#F5F0E8', opacity: 0.35, letterSpacing: '0.1em', textTransform: 'uppercase' }}>{ev.sub}</div>
        {/* Progress */}
        <div style={{ marginTop: 10, display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 100, height: 2, background: 'rgba(245,240,232,0.1)' }}>
            <div style={{ width: `${pct}%`, height: '100%', background: tweaks.accentColor }}/>
          </div>

const CLOTHING_SIZES = ['XS','S','M','L','XL','XXL'];

function ProductDetailModal({ p, tweaks, onAdd, onClose }) {
  const imgs = p.imgs && p.imgs.length ? p.imgs : (p.img ? [p.img] : []);
  const [imgIdx, setImgIdx] = useState(0);
  const [zoomed, setZoomed] = useState(false);
  const [zoomPos, setZoomPos] = useState({ x: 50, y: 50 });
  const [size, setSize] = useState('');
  const [added, setAdded] = useState(false);
  const sizes = p.type === 'Ropa' ? (p.sizes && p.sizes.length ? p.sizes : CLOTHING_SIZES) : ['Único'];

  const handleMouseMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    setZoomPos({ x: ((e.clientX - rect.left) / rect.width) * 100, y: ((e.clientY - rect.top) / rect.height) * 100 });
  };
  const handleAdd = () => {
    if (p.type === 'Ropa' && !size) return;
    onAdd({ ...p, selectedSize: size });
    setAdded(true); setTimeout(() => setAdded(false), 1500);
  };

  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)', zIndex: 200, backdropFilter: 'blur(4px)' }}/>

        <style>{`@keyframes pModalIn{from{opacity:0;transform:translate(-50%,-47%) scale(0.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}`}</style>
        {/* LEFT: images */}
        <div style={{ background: imgs[imgIdx] ? '#0A0A0A' : p.bg }}

          >
            {imgs[imgIdx] ? (
              <div style={{ width: '100%', height: '100%', backgroundImage: `url(${imgs[imgIdx]})`, backgroundSize: zoomed ? '220%' : 'cover', backgroundPosition: zoomed ? `${zoomPos.x}% ${zoomPos.y}%` : 'center', transition: zoomed ? 'background-position 0.05s' : 'background-size 0.3s' }}/>
            ) : (
              <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <div className="logo-white" style={{ width: 100, height: 100, opacity: 0.07 }}/>
              </div>
            )}
            {!zoomed && imgs[imgIdx] && <div style={{ position: 'absolute', bottom: 12, left: 12, fontFamily: 'Space Mono', fontSize: 8, color: '#fff', opacity: 0.4, background: 'rgba(0,0,0,0.4)', padding: '4px 8px', letterSpacing: '0.1em' }}>CLICK PARA ZOOM</div>}
          </div>
          {imgs.length > 1 && (
            <div style={{ display: 'flex', gap: 4, padding: '8px', background: '#0A0A0A', overflowX: 'auto' }}>
              {imgs.map((img, i) => (
                <div key={i} onClick={() => { setImgIdx(i); setZoomed(false); }} style={{ width: 52, height: 52, flexShrink: 0, cursor: 'pointer', backgroundImage: `url(${img})`, backgroundSize: 'cover', backgroundPosition: 'center', border: `2px solid ${i === imgIdx ? tweaks.accentColor : 'transparent'}`, opacity: i === imgIdx ? 1 : 0.45, transition: 'all 0.2s' }}/>
              ))}
            </div>
          )}
        </div>
        {/* RIGHT: info */}
        <div style={{ padding: '36px 32px', display: 'flex', flexDirection: 'column', maxHeight: 520, overflowY: 'auto' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
            <span style={{ fontFamily: 'Barlow Condensed', fontWeight: 700, fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase', color: tweaks.accentColor }}>{p.type}</span>

          {p.desc && <p style={{ fontFamily: 'Playfair Display', fontSize: 14, color: '#F5F0E8', opacity: 0.55, lineHeight: 1.8, marginBottom: 24 }}>{p.desc}</p>}
          {/* Tallas */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontFamily: 'Space Mono', fontSize: 9, letterSpacing: '0.15em', textTransform: 'uppercase', color: '#F5F0E8', opacity: 0.4, marginBottom: 10 }}>
              Talla {p.type === 'Ropa' && !size && <span style={{ color: tweaks.accentColor }}>— elige una</span>}

        </div>
      </div>
    </>
  );
}

// ─── RESERVATION MODAL ────────────────────────────────────────────────────────
function ReservationModal({ event, onClose, tweaks, onConfirm }) {
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({ name: '', email: '', phone: '' });
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const validate = () => { const e = {}; if (!form.name.trim()) e.name = 'Requerido'; if (!form.email.includes('@')) e.email = 'Email inválido'; return e; };
  const submit = async () => {
    const e = validate(); if (Object.keys(e).length) { setErrors(e); return; }
    setSubmitting(true);
    if (onConfirm) await onConfirm(event, form);
    setSubmitting(false); setStep(2);
  };
  const iStyle = (err) => ({
    width: '100%', padding: '10px 0', background: 'transparent',
    border: 'none', borderBottom: `2px solid ${err ? tweaks.accentColor : 'rgba(13,13,13,0.15)'}`,
    fontFamily: 'Playfair Display', fontSize: 15, outline: 'none', color: '#0D0D0D',
  });
  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.65)', zIndex: 200, backdropFilter: 'blur(4px)' }}/>
      <div style={{
        position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%,-50%)',
        width: 520, background: tweaks.paperColor, zIndex: 201, padding: '48px',
        borderTop: `6px solid ${tweaks.accentColor}`,
        animation: 'modalIn 0.35s cubic-bezier(0.22,1,0.36,1)',
      }}>
        <style>{`@keyframes modalIn { from{opacity:0;transform:translate(-50%,-46%) scale(0.96)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }`}</style>
        {step === 1 ? <>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 32 }}>
            <div>
              <div style={{ fontFamily: 'Space Mono', fontSize: 9, letterSpacing: '0.2em', textTransform: 'uppercase', opacity: 0.4, marginBottom: 8 }}>Reservar lugar · {event.tag}</div>
              <h3 style={{ fontFamily: 'Cormorant Garamond', fontWeight: 600, fontStyle: 'normal', fontSize: 32, textTransform: 'uppercase', lineHeight: 1 }}>{event.title}</h3>
              <p style={{ fontFamily: 'Space Mono', fontSize: 10, opacity: 0.5, marginTop: 6 }}>{event.date} {event.month} · {event.time} · €{event.price}</p>
            </div>
            <button onClick={onClose} style={{ fontSize: 24, opacity: 0.3 }}>×</button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 22, marginBottom: 32 }}>
            {[{k:'name',l:'Nombre completo',t:'text'},{k:'email',l:'Email',t:'email'},{k:'phone',l:'Teléfono (opcional)',t:'tel'}].map(f => (
              <div key={f.k}>
                <label style={{ fontFamily: 'Space Mono', fontSize: 9, letterSpacing: '0.15em', textTransform: 'uppercase', opacity: 0.4, display: 'block', marginBottom: 6 }}>{f.l}</label>
                <input type={f.t} value={form[f.k]} onChange={e => setForm({...form,[f.k]:e.target.value})} style={iStyle(errors[f.k])}/>
                {errors[f.k] && <p style={{ fontFamily: 'Space Mono', fontSize: 9, color: tweaks.accentColor, marginTop: 4 }}>{errors[f.k]}</p>}
              </div>
            ))}
          </div>
          <button onClick={submit} style={{
            width: '100%', padding: '16px', background: tweaks.accentColor, color: '#fff',
            fontFamily: 'Barlow Condensed', fontWeight: 700, fontSize: 14, letterSpacing: '0.2em',
            textTransform: 'uppercase', border: 'none', cursor: 'pointer',
          }}>Confirmar reserva →</button>
        </> : (
          <div style={{ textAlign: 'center', padding: '20px 0' }}>
            <div style={{ fontFamily: 'Barlow Condensed', fontWeight: 900, fontSize: 80, color: tweaks.accentColor, lineHeight: 1, marginBottom: 16 }}>✓</div>
            <h3 style={{ fontFamily: 'Cormorant Garamond', fontWeight: 600, fontStyle: 'normal', fontSize: 32, textTransform: 'uppercase', marginBottom: 12 }}>¡Reservado!</h3>

// ─── TWEAKS PANEL ─────────────────────────────────────────────────────────────
function TweaksPanel({ tweaks, setTweaks }) {
  const [open, setOpen] = useState(false);
  useEffect(() => {
    const h = e => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);
  const set = (k, v) => { const n = {...tweaks,[k]:v}; setTweaks(n); window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}},'*'); };
  if (!open) return null;
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, width: 260, background: tweaks.paperColor, border: '2px solid #0D0D0D', padding: '20px', zIndex: 300, boxShadow: '6px 6px 0 #0D0D0D' }}>
      <div style={{ fontFamily: 'Barlow Condensed', fontWeight: 900, fontSize: 16, letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 16 }}>Tweaks</div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0', borderBottom: '1px solid rgba(13,13,13,0.1)' }}>
        <span style={{ fontFamily: 'Space Mono', fontSize: 11 }}>Acento</span>
        <input type="color" value={tweaks.accentColor} onChange={e => set('accentColor', e.target.value)} style={{ width: 36, height: 24, border: 'none', cursor: 'pointer' }}/>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 0' }}>
        <span style={{ fontFamily: 'Space Mono', fontSize: 11 }}>Papel</span>
        <input type="color" value={tweaks.paperColor} onChange={e => set('paperColor', e.target.value)} style={{ width: 36, height: 24, border: 'none', cursor: 'pointer' }}/>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
// ─── ADAPTERS ─────────────────────────────────────────────────────────────────
const evFromDB  = r => ({ id: r.id, date: r.date, month: r.month, day: r.day||'SAB', time: r.time, title: r.title, sub: r.sub||'', desc: r.descripcion||'', spots: r.spots, total: r.total, price: r.price, tag: r.tag||'ART.', active: r.active, img: r.img||null });
const prodFromDB = r => ({ id: r.id, name: r.name, price: r.price, type: r.type, desc: r.descripcion||'', bg: r.bg, imgs: r.imgs||[], sizes: r.sizes||['XS','S','M','L','XL','XXL'], active: r.active });
const galFromDB  = r => ({ id: r.id, label: r.label, date: r.date||'', img: r.img||null });

function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [cart, setCart] = useState(() => { try { return JSON.parse(localStorage.getItem('cp2_cart')||'[]'); } catch { return []; } });
  const [cartOpen, setCartOpen] = useState(false);
  const [reserveEvent, setReserveEvent] = useState(null);
  const [productDetail, setProductDetail] = useState(null);

  // Supabase data
  const [sbEvents, setSbEvents] = useState(null);
  const [sbProducts, setSbProducts] = useState(null);
  const [sbGallery, setSbGallery] = useState(null);

  useEffect(() => {
    // Load from Supabase
    Promise.all([
      sb.from('events').select('*').eq('active', true).order('created_at'),
      sb.from('products').select('*').eq('active', true).order('created_at'),
      sb.from('gallery').select('*').order('created_at'),
    ]).then(([ev, pr, ga]) => {
      if (ev.data && ev.data.length > 0) setSbEvents(ev.data.map(evFromDB));
      if (pr.data && pr.data.length > 0) setSbProducts(pr.data.map(prodFromDB));
      if (ga.data && ga.data.length > 0) setSbGallery(ga.data.map(galFromDB));
    });
  }, []);

  // Use Supabase data if available, fallback to static defaults
  const liveEvents   = sbEvents   || EVENTS;
  const liveProducts = sbProducts || PRODUCTS;
  const liveGallery  = sbGallery  || GALLERY_ITEMS;

  useEffect(() => { localStorage.setItem('cp2_cart', JSON.stringify(cart)); }, [cart]);

  const addToCart = p => setCart(prev => {
    const ex = prev.find(i => i.id === p.id);
    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty+1} : i);
    return [...prev, {...p, qty:1}];
  });
  const removeFromCart = id => setCart(prev => prev.filter(i => i.id !== id));
  const updateQty = (id, qty) => { if (qty < 1) { removeFromCart(id); return; } setCart(prev => prev.map(i => i.id===id ? {...i,qty} : i)); };
  const cartCount = cart.reduce((s,i) => s + i.qty, 0);

  // Save reservation to Supabase
  const handleReserve = async (eventObj, formData) => {
    await sb.from('reservations').insert({
      event_id: eventObj.id || null,
      event_title: eventObj.title,
      name: formData.name,
      email: formData.email,
      phone: formData.phone || null,
      note: formData.note || null,
    });
  };

  return (
    <div style={{ background: tweaks.paperColor, minHeight: '100vh' }}>
      <SideNav cartCount={cartCount} onCartOpen={() => setCartOpen(true)} tweaks={tweaks} />
      <Hero tweaks={tweaks} />
      <ClubSection tweaks={tweaks} />
      <EventsSection tweaks={tweaks} events={liveEvents} onReserve={setReserveEvent} />
      <GallerySection tweaks={tweaks} items={liveGallery} />
      <ShopSection tweaks={tweaks} products={liveProducts} onAdd={addToCart} onOpenProduct={setProductDetail} />
      <Footer tweaks={tweaks} />
      {cartOpen && <CartDrawer cart={cart} onClose={() => setCartOpen(false)} onRemove={removeFromCart} onQty={updateQty} tweaks={tweaks} />}
      {productDetail && <ProductDetailModal p={productDetail} tweaks={tweaks} onAdd={addToCart} onClose={() => setProductDetail(null)} />}
      {reserveEvent && <ReservationModal event={reserveEvent} onClose={() => setReserveEvent(null)} tweaks={tweaks} onConfirm={handleReserve} />}
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
